<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAZZEL Campaign Checklist</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: linear-gradient(#f06d2f, #d85a1f);
  color: #5a2c1a;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.hero {
  text-align: center;
}

.hero img {
  width: 100%;
  max-height: 400px;
  object-fit: contain;
  border-radius: 20px;
}

h1 {
  font-size: 28px;
  margin-top: 10px;
}

.section {
  background: #f7e6dc;
  border-radius: 20px;
  padding: 20px;
  margin-top: 20px;
}

.member {
  margin-top: 20px;
}

.check {
  background: #fff;
  padding: 12px;
  border-radius: 10px;
  margin-top: 8px;
  display: flex;
  align-items: center;
}

.check input {
  margin-right: 10px;
}

.progress {
  margin-top: 10px;
  font-weight: bold;
}

button {
  margin-top: 20px;
  padding: 15px;
  border: none;
  border-radius: 20px;
  background: #fff;
  color: #d85a1f;
  font-weight: bold;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="container">

  <div class="hero">
    <img src="artist.jpg">
    <h1>GET UP AND DANCE<br>CAMPAIGN CHECKLIST</h1>
  </div>

  <div class="section">
    <h2>Pre-add / Pre-save</h2>
    <div class="check">
      <input type="checkbox" onchange="save()">
      <span>どちらか1つでOK（Spotify / Apple）</span>
    </div>
    <a href="https://presave.umusic.com/pspa-mazzel-guad/landing-page" target="_blank">
      詳細リンクを入れる
    </a>
  </div>

  <div class="section">
    <h2>Spotify Canvasシェアキャンペーン <span style="float:right;">未発表</span></h2>
    <p>前回類似キャンペーンあり / 特典：メンバー別待受想定</p>
    <div class="progress" id="progress">進捗：0 / 24</div>

    <div id="members"></div>

    <button onclick="downloadImage()">保存用画像をダウンロード</button>
  </div>

</div>

<script>
const members = ["KAIRYU","NAOYA","RAN","SEITO","RYUKI","TAKUTO","HAYATO","EIKI"];
const container = document.getElementById("members");

members.forEach(m => {
  const div = document.createElement("div");
  div.className = "member";

  div.innerHTML = `
    <h3>${m}</h3>
    <div class="check"><input type="checkbox" onchange="save()"> ${m} シェア</div>
    <div class="check"><input type="checkbox" onchange="save()"> ${m} 応募</div>
    <div class="check"><input type="checkbox" onchange="save()"> ⭐ ${m} 特典保存</div>
  `;

  container.appendChild(div);
});

function save() {
  const checks = document.querySelectorAll("input");
  let count = 0;

  checks.forEach((c, i) => {
    localStorage.setItem("check" + i, c.checked);
    if (c.checked) count++;
  });

  document.getElementById("progress").innerText = `進捗：${count} / 24`;
}

function load() {
  const checks = document.querySelectorAll("input");
  let count = 0;

  checks.forEach((c, i) => {
    const saved = localStorage.getItem("check" + i);
    if (saved === "true") {
      c.checked = true;
      count++;
    }
  });

  document.getElementById("progress").innerText = `進捗：${count} / 24`;
}

function downloadImage() {
  alert("※GitHub Pagesでは画像保存は制限される場合あり（ローカルではOK）");
}

load();
</script>

</body>
</html>
